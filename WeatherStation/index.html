<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div id="page">

        <div id="left-pane">
            <header id="title">Lab Monitoring</header>
            <div id="lab-selection">
                <input type="button" value="Example">
            </div>
            <div id="option-pane">
                <input type="button" value="Fetch" id="getData">
                <input type="text" name="address" id="ip-address" autocomplete="off">
            </div>
            
        </div>


        <div id="main-pane">
            <header id="title">Weather station dashboard</header>
            
            <div id="chart">
                <canvas id="dashboard" width="600" height="400"></canvas>
            </div>
            <div id="data-section">
                <div class="data">
                    <span id="temp">Temperature: 24°C</span>
                    <span id="hum">Humidity: aaa</span>
                    <span id="lum">Luminosity: </span>
                </div>
            </div>
        </div>


    </div>
</body>
</html>
