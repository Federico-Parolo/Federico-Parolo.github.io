<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Predictor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div id="content">
        <div id="main-content">
            <header id="top-title">Stock Predictor</header>
            <p>Insert the last values of a stock currency to have a prediction:</p>
            <input type="text" name="stockPrice" id="dataSample" autocomplete="off" placeholder="±x,y%">
            <button type="button" id="plotButton">Show Change</button>
            
            <div id="diagram-container">
                <canvas id="stockDiagram" width="500" height="300"></canvas>
            </div>
        </div>
        

        <div id="data-history">
            <p>Last Inserted Samples:</p>
            <div id="last-changes">

            </div>
        </div>
    </div>
</body>
</html>
