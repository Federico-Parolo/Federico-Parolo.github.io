<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo Sim</title>
</head>
<body style="background-color: gray;">
    <div style="display: flex;justify-content: center;align-items: center;">
        <canvas id="Canvas" width="800" height="800" style="background-color: white; image-rendering: pixelated; border: 2px solid red;"></canvas>
    </div>
    <div style="position: fixed; top: 1rem; left: 1rem; display: flex; flex-direction: column; gap: 1rem;">
        <textarea id="text" placeholder="(Pi = 3.14)" readonly disabled></textarea>
    <input type="text" id="pointAdder" placeholder="Insert #Points to draw" autocomplete="off">
    <button type="button" id="reset">Reset to initial points</button>
    <div>
        <span>Points:</span>
        <span id="nPoints"></span>
    </div>
    
    </div>
    
</body>
<script src="calc.js"></script>
